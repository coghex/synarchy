keybinds:
  # Movement
  moveUp: W
  moveDown: S
  moveLeft: A
  moveRight: D

  # System
  # `escape` is intentionally hardcoded to Escape in the engine —
  # rebinding the entry here has no effect.
  escape: Escape
  openShell: Grave

  # UI panels (alphanumeric, rebind freely)
  toggleEventLog: L
