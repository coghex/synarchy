name: CI image

on:
  push:
    branches: [master]
    paths:
      - .github/ci/Dockerfile
      - .github/workflows/ci-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ci-v2 (#671): generation bump because the image contract changed
      # (GHC + cabal + hackage index baked in — ci.yml no longer runs
      # haskell-actions/setup, so it MUST run against ci-v2 or later).
      # Publishing v2 leaves ci-v1 untouched for any branch still on it.
      - name: Build and push fixed CI image
        uses: docker/build-push-action@v6
        with:
          context: .github/ci
          file: .github/ci/Dockerfile
          push: true
          tags: ghcr.io/coghex/synarchy-ci:ci-v2
