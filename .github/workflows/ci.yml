# CI gate (#436): build everything warning-free and run the headless
# test tiers on Linux — the first automated validation of the Linux
# build (development is on macOS).
#
# Coverage vs CLAUDE.md testing tiers:
#   - tier 2 hspec:   cabal test synarchy-test-headless
#   - tier 2 audit:   python3 tools/test_audit.py
#   - tier 2 worldgen: tools/world_check.py --quick, a blocking gate for
#     worldgen-output PRs and every post-merge master push.
#     Worldgen float math proved bit-stable across architectures on the
#     first run (6/6 exact-match against the macOS/aarch64-captured
#     baselines from #421, PR #449) — if it ever flakes cross-arch,
#     demote it to continue-on-error and investigate rather than
#     rebaselining per-platform.
#
# -Werror is applied to the synarchy package only (not dependencies),
# so the warning-clean state from #435 is enforced, not just observed.
#
# Build caching (#526, reworked in #671): the GHC/cabal toolchain and a
# hackage index snapshot are baked into the CI image (see
# .github/ci/Dockerfile; the old actions/cache toolchain cache never hit
# inside the container, so GHC was silently re-downloaded every run), and
# two caches persist across runs so a typical PR recompiles only the
# modules it changed rather than all 360+ —
#   1. the cabal dependency store (at the image-pinned CABAL_DIR), and
#   2. the project build products (dist-newstyle), so GHC's recompilation
#      avoidance rebuilds only dirty modules + their reverse-deps.
# The dist-newstyle key includes the GHC and Cabal versions and the
# dependency plan hash (so a compiler/Cabal bump or a dependency change
# invalidates it) — and NOTHING per-commit (#790). GitHub cache keys
# are immutable: actions/cache only writes on a key miss and an
# exact-key hit never re-saves, so a stable plan-hash key means the
# FIRST run for a given plan freezes one snapshot and every later run
# on that same plan just restores it and saves nothing. Retained
# build-product snapshots are therefore BOUNDED by the number of
# distinct dependency plans in flight (a handful that only turns over
# when dependencies change), not by commit count. This mirrors the
# dependency-store cache below, which has always been keyed this same
# stable way. When the plan DOES change the exact key misses and
# restore-keys fall back to the most recent snapshot for this GHC/Cabal
# for partial reuse, after which exactly one new snapshot is saved
# under the new plan key. Trade-off (accepted for #790, and the same
# one the deps cache already makes): within one plan window the
# snapshot is frozen at that window's first commit, so a warm run
# rebuilds everything changed since then rather than only since the
# previous commit — still incremental (deps + unchanged modules
# restored), never a cold build. Concurrent runs on the same plan are
# safe with no delete step at all: a second saver of an existing key
# gets a benign "already exists" and no run can evict a cache another
# is restoring.
# Both key families carry a v2 marker BEFORE the variable parts: caches
# captured before #671 hold content archived under the old toolchain
# paths (actions/cache preserves absolute paths), so restoring one would
# extract to a location nothing reads from — the marker keeps
# prefix-matched restore-keys from ever picking them up.
# Bounding this churn also stops build-product caches from crowding the
# shared repo cache quota and LRU-evicting the deps-store cache (#790).
#
# CI-image publication ordering (#784): this file and ci-image.yml used
# to race as two fully independent workflows — both fired on the same
# push, with no ordering between "publish a new image" and "consume the
# fixed tag", so a Dockerfile-changing push could start build-test
# against the STALE previous image while the new one was still being
# built, and a Dockerfile-changing PR never built or validated its
# candidate at all (ci-image.yml had no pull_request trigger). The fix:
# resolve-image below calls ci-image.yml as a REUSABLE workflow
# (`uses: ./.github/workflows/ci-image.yml`) — its jobs join THIS run's
# dependency graph rather than running as a separate, unordered trigger
# — and build-test `needs: resolve-image`, so GitHub structurally cannot
# start build-test's container before resolve-image (and therefore
# ci-image.yml's own jobs) finish. That's also why container.image below
# is an expression referencing needs.resolve-image.outputs.image rather
# than a literal tag: GitHub resolves jobs.<job>.container.image using
# the `needs` context once every needed job has completed, so a
# job-level container CAN depend on a job earlier in the same run — the
# old belief that it couldn't (see #671's original literal-tag choice)
# is what let publication and consumption go unordered in the first
# place.
#
# ci-image.yml tags each build content-addressably: `ci-<sha256 of
# .github/ci/Dockerfile ++ .github/workflows/ci-image.yml itself, first
# 16 hex chars>` — deliberately covering BOTH files, so a PR that only
# changes the image-build recipe (not the Dockerfile) still mints a new
# tag and re-exercises the candidate build+validate path, not just a
# Dockerfile edit. A tag is only ever pushed ONCE — the first time that
# exact (Dockerfile, recipe) pair is seen — so an image reference
# already consumed by an in-progress or historical run can never be
# silently overwritten with different contents; a later edit to either
# file always produces a brand-new tag rather than mutating an old one.
# Every run (PR or push) computes this tag and does a cheap
# registry-metadata check (`docker buildx imagetools inspect`, no layer
# pull) to see if it already exists:
#   - Already published (the overwhelmingly common case — neither file
#     changed): resolve-image just resolves the existing tag, no rebuild.
#   - Not yet published (a Dockerfile- or recipe-changing push OR
#     pull_request): builds the candidate, hard-validates its baked
#     GHC/Cabal versions against the Dockerfile's own ARG defaults
#     (failing the job — and therefore build-test, transitively, via
#     `needs:` — if they don't match), and ONLY THEN pushes it under the
#     new content tag. This is what makes a Dockerfile/recipe-changing PR
#     build and validate its own candidate image before merge, rather
#     than deferring the first real build to master while that PR's own
#     CI still runs against the old contract.
# Docker builds aren't perfectly reproducible even from byte-identical
# input (e.g. `apt-get update`/an unpinned ghcup download can resolve
# different bytes on a later rebuild), so two concurrent runs that land
# on the SAME not-yet-published tag could otherwise both build and race
# to push possibly-different content to it. ci-image.yml's resolve job
# closes this with a job-level `concurrency:` group keyed on the tag
# itself: GitHub queues a second run sharing that group behind the
# first rather than letting both execute their check-then-push window
# concurrently, so by the time the second one's own existence check
# runs, the first one's publish (if any) has already landed and it
# always takes the fast, no-rebuild path instead of racing.
# There is no manual version-bump/refresh procedure to follow any more —
# editing the Dockerfile (or ci-image.yml's build recipe) IS the
# procedure; resolve-image detects the content change and publishes
# automatically as part of that same PR/push's CI run.
#
# Trade-off accepted at #526: there is NO separate from-scratch clean
# -Werror backstop job. A warning that only surfaces on a full rebuild of
# the whole module graph (cross-module interactions in files that don't
# get recompiled) can therefore slip past -Werror; cached modules are
# assumed to have been warning-free when built. A warning in any
# CHANGED / recompiled module still fails the build (-Werror stays on).
name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolves (building + validating + first-publishing when needed) the
  # immutable, content-addressed CI image tag build-test consumes. Lives
  # in the separate reusable workflow .github/workflows/ci-image.yml
  # (not inlined here) so that file's own content participates in the
  # candidate's identity hash — see that file's header and the header
  # comment above for the full design (#784).
  resolve-image:
    uses: ./.github/workflows/ci-image.yml
    permissions:
      contents: read
      packages: write

  build-test:
    needs: resolve-image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    container:
      # Resolved from resolve-image's output (#784) rather than a
      # literal tag — see the header comment above for why this is safe
      # and how it eliminates the old publish/consume race.
      image: ${{ needs.resolve-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # fetch-depth: 0 so the path-selective probe step (#530) can diff a
      # PR against its base to see which files changed.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The checkout is mounted from the hosted runner into this job's
      # container, so it can be owned by a different UID than the shell
      # running later steps. Trust this exact workspace before any direct
      # Git invocation (path-selective gates and probes both need it).
      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # The toolchain is baked into the CI image (#671, content-addressed
      # and resolved by resolve-image since #784) — no haskell-actions/
      # setup, no toolchain cache. (The previous cache never hit inside
      # the container: the action installs via the mounted runner tool
      # cache, not the path we cached, so GHC was re-downloaded on every
      # run.) This step only exports the image's paths for later steps —
      # image ENV isn't reliably propagated through the runner's
      # docker-exec env — and hard-fails if the image is stale (no ghc/
      # cabal at these exact paths), rather than letting cabal silently
      # pick up some other compiler. resolve-image's own validate step
      # additionally hard-checks the exact baked GHC/Cabal version
      # strings before a candidate is ever published.
      - name: Toolchain (baked into the CI image)
        run: |
          /usr/local/.ghcup/bin/ghc --version
          /usr/local/.ghcup/bin/cabal --version
          echo "/usr/local/.ghcup/bin" >> "$GITHUB_PATH"
          echo "CABAL_DIR=/usr/local/cabal" >> "$GITHUB_ENV"

      - name: Configure (-Werror for the local package only)
        run: |
          # Incremental against the index snapshot baked into the image —
          # a delta fetch of seconds, not a full index download.
          cabal update
          # Scoped to `package synarchy` so dependency warnings can't
          # fail the build — only regressions against #435's clean slate.
          {
            echo "package synarchy"
            echo "  ghc-options: -Werror"
          } > cabal.project.local
          cabal build all --dry-run

      # Hspec is deliberately full and blocking on every PR. These two
      # independent gates are path-selective on PRs, but always run after a
      # merge so master retains the complete regression backstop.
      - name: Select expensive path-relevant gates
        id: expensive-gates
        run: |
          if [ "${{ github.event_name }}" = pull_request ]; then
            BASE='${{ github.event.pull_request.base.sha }}'
            git fetch --no-tags origin "$BASE"
            CHANGED="$(git diff --name-only "$BASE" HEAD)"
          else
            CHANGED="$(git ls-files)"
          fi
          printf '%s\n' "$CHANGED" | python3 tools/ci_expensive_gates.py --stdin --gate worldgen | \
            sed 's/^/worldgen=/' >> "$GITHUB_OUTPUT"
          printf '%s\n' "$CHANGED" | python3 tools/ci_expensive_gates.py --stdin --gate graphical | \
            sed 's/^/graphical=/' >> "$GITHUB_OUTPUT"

      # plan.json exists after --dry-run; its hash keys the store cache.
      # The store path is static because the image pins CABAL_DIR (#671).
      - name: Restore dependency cache
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: /usr/local/cabal/store
          key: deps-v2-${{ runner.os }}-ghc9.12.2-${{ hashFiles('dist-newstyle/cache/plan.json') }}
          restore-keys: deps-v2-${{ runner.os }}-ghc9.12.2-

      # Cache the project build products so GHC recompiles only dirty
      # modules. plan.json (from the --dry-run above) exists now, so its
      # hash keys the cache alongside the GHC/Cabal versions. The key is
      # stable per plan (no per-commit component, #790): the combined
      # cache action restores here and, at post-job, saves dist-newstyle
      # ONLY when the exact key missed — so an unchanged plan re-saves
      # nothing (one frozen snapshot per plan), while a changed plan
      # restores the newest prior snapshot for this GHC/Cabal via
      # restore-keys and then saves exactly one new entry.
      - name: Cache project build (dist-newstyle)
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: dist-v2-${{ runner.os }}-ghc-9.12.2-cabal-3.16.1.0-${{ hashFiles('dist-newstyle/cache/plan.json') }}
          restore-keys: |
            dist-v2-${{ runner.os }}-ghc-9.12.2-cabal-3.16.1.0-

      - name: Build dependencies
        run: cabal build all --only-dependencies

      # Save the store as soon as deps are built, so a later failure in
      # the package build doesn't throw away the expensive part.
      - name: Save dependency cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /usr/local/cabal/store
          key: deps-v2-${{ runner.os }}-ghc9.12.2-${{ hashFiles('dist-newstyle/cache/plan.json') }}

      - name: Build (library + executable)
        run: cabal build all

      - name: Build test suites
        run: |
          cabal build synarchy-test-headless
          if [ "${{ steps.expensive-gates.outputs.graphical }}" = true ]; then
            cabal build synarchy-test-graphical
          else
            echo "Skipping graphical test-suite build: no graphics-facing paths changed."
          fi

      - name: Headless test suite
        run: cabal test synarchy-test-headless --test-show-details=direct

      - name: Test audit
        run: python3 tools/test_audit.py

      # Cheap, no-engine guard (#538/#541/#545): fails if a Lua module
      # that was split to stay reviewable (the debug overlay,
      # unit-resource physiology, or unit-AI splits) grows back past
      # its agreed line budget.
      - name: Lua module line budget
        run: python3 tools/lua_module_budget.py

      # Cheap, no-engine guard (#814): fails if a scripts/ui/*.lua widget
      # module gains a second top-level definition of an already-defined
      # exported function, which silently overwrites the earlier one in
      # the module table with no error (the slider.findByElementHandle
      # regression this issue fixed).
      - name: Lua duplicate function audit
        run: python3 tools/lua_duplicate_function_audit.py

      # Cheap, no-engine guard (#787): fails if a Haskell module split
      # to stay reviewable (the input-thread facade + its dispatch
      # submodules) grows back past its agreed line budget.
      - name: Haskell module line budget
        run: python3 tools/haskell_module_budget.py

      # Cheap, no-engine guard (#756 req 10): fails if a field is added
      # to a root state owner (EngineEnv, EngineState, WorldManager,
      # WorldState, the World.Save.Types envelope) or a new Lua module
      # is registered with scripts/lib/save_modules.lua without a
      # matching classification landing in
      # docs/persistence_state_inventory.md. See
      # docs/persistence_contract.md SS7 for what this does and doesn't
      # guarantee.
      - name: Persistence inventory audit
        run: |
          python3 tools/test_persistence_inventory_audit.py
          python3 tools/persistence_inventory_audit.py

      # Worldgen regression gate — see the header comment. Baselines
      # are tracked in tools/baselines/ (#421), captured on the primary
      # dev machine (macOS/aarch64); Linux output matches them exactly.
      - name: world_check --quick
        if: steps.expensive-gates.outputs.worldgen == 'true'
        run: python3 tools/world_check.py --quick

      # Validate the path->probe mapping wiring on every run (cheap, no
      # engine) — a broken mapping would otherwise only surface when a PR
      # mis-selects.
      - name: ci_probes self-test
        run: |
          python3 tools/ci_probes.py --self-test
          python3 tools/ci_expensive_gates.py --self-test

      # Path-selective, BLOCKING behavior-probe gate (#530). Only on PRs:
      # diff against the base, pick the CI-eligible probes relevant to the
      # changed files (full curated smoke set for core/unclassified changes,
      # none for docs/assets or manual-only probe areas), and run them
      # against the exe already built above.
      # --jobs 2 (#671) pairs probes on the 4-vCPU runner — the eligible
      # set ran strictly sequentially before (~4 min for the full set of
      # 4; #722 grew the set to 7, ~6 min sequential / ~3-4 min under
      # --jobs 2 on a warm dev machine). --retries 1 re-runs a failed
      # probe SOLO before failing; that solo re-run is the designed
      # absorber for exactly the parallel-engine contention flakes
      # --jobs can introduce, so if flaky retries start showing up
      # regularly here, drop back to --jobs 1 rather than growing the
      # retry count.
      - name: Behavior probes (path-selective)
        if: github.event_name == 'pull_request'
        run: |
          BASE='${{ github.event.pull_request.base.sha }}'
          echo "Diffing against base $BASE"
          git fetch --no-tags origin "$BASE"
          CHANGED="$(git diff --name-only "$BASE" HEAD)"
          echo "Changed files:"; echo "$CHANGED" | sed 's/^/  /'
          ONLY="$(printf '%s\n' "$CHANGED" | python3 tools/ci_probes.py --stdin)"
          if [ -z "$ONLY" ]; then
            echo "No behavior probes selected for this change — skipping."
            exit 0
          fi
          echo "Selected probes: $ONLY"
          python3 tools/run_probes.py --only "$ONLY" --exact --retries 1 --jobs 2
