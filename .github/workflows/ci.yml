# CI gate (#436): build everything warning-free and run the headless
# test tiers on Linux — the first automated validation of the Linux
# build (development is on macOS).
#
# Coverage vs CLAUDE.md testing tiers:
#   - tier 2 hspec:   cabal test synarchy-test-headless
#   - tier 2 audit:   python3 tools/test_audit.py
#   - tier 2 worldgen: tools/world_check.py --quick, a BLOCKING gate.
#     Worldgen float math proved bit-stable across architectures on the
#     first run (6/6 exact-match against the macOS/aarch64-captured
#     baselines from #421, PR #449) — if it ever flakes cross-arch,
#     demote it to continue-on-error and investigate rather than
#     rebaselining per-platform.
#
# -Werror is applied to the synarchy package only (not dependencies),
# so the warning-clean state from #435 is enforced, not just observed.
#
# Build caching (#526): three caches persist across runs so a typical PR
# recompiles only the modules it changed rather than all 360+ —
#   1. the cabal dependency store (unchanged from the original gate),
#   2. the GHC/cabal toolchain (~/.ghcup), so "Set up GHC" reuses the
#      compiler instead of re-downloading it, and
#   3. the project build products (dist-newstyle), so GHC's recompilation
#      avoidance rebuilds only dirty modules + their reverse-deps.
# The dist-newstyle key includes the GHC and Cabal versions and the
# dependency plan hash (so a compiler/Cabal bump or a dependency change
# invalidates it) plus a per-commit suffix so every run saves a fresh
# snapshot; restore-keys let the next run restore the most recent
# snapshot for partial reuse.
# GitHub's 10 GB LRU cache eviction bounds the accumulation.
#
# Trade-off accepted at #526: there is NO separate from-scratch clean
# -Werror backstop job. A warning that only surfaces on a full rebuild of
# the whole module graph (cross-module interactions in files that don't
# get recompiled) can therefore slip past -Werror; cached modules are
# assumed to have been warning-free when built. A warning in any
# CHANGED / recompiled module still fails the build (-Werror stays on).
name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute CI image tag
        id: meta
        run: |
          set -euo pipefail
          TAG="ci-$(sha256sum .github/ci/Dockerfile | cut -c1-16)"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/synarchy-ci:${TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI image if missing
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          set -euo pipefail
          if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
            echo "CI image already exists: $IMAGE"
            exit 0
          fi
          docker build --pull -t "$IMAGE" -f .github/ci/Dockerfile .github/ci
          docker push "$IMAGE"

  build-test:
    needs: ci-image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      # Keep ghcup under a user-writable prefix so actions/cache can
      # restore it cleanly. Restoring into /usr/local/.ghcup started
      # failing with tar "Cannot utime / Cannot change mode" errors on
      # current hosted runners, which silently degraded the toolchain
      # cache into a miss every run.
      GHCUP_INSTALL_BASE_PREFIX: ${{ runner.temp }}/ghcup-root
    steps:
      # fetch-depth: 0 so the path-selective probe step (#530) can diff a
      # PR against its base to see which files changed.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cache the ghcup-installed toolchain so "Set up GHC" reuses GHC
      # 9.12.2 instead of re-downloading + unpacking it (~2.5 min).
      # ghcup stores its payload under $GHCUP_INSTALL_BASE_PREFIX/.ghcup on
      # Unix, so we steer it into a user-writable runner-temp prefix and
      # cache that exact directory. Restored before setup so the action
      # finds the existing install; saved at post-job. Static key — only a
      # compiler/Cabal version bump invalidates it.
      - name: Cache GHC toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.GHCUP_INSTALL_BASE_PREFIX }}/.ghcup
          key: ghcup-${{ runner.os }}-ghc-9.12.2-cabal-3.16.1.0-v3

      - name: Set up GHC
        id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.12.2'
          cabal-version: '3.16.1.0'

      - name: Configure (-Werror for the local package only)
        run: |
          cabal update
          # Scoped to `package synarchy` so dependency warnings can't
          # fail the build — only regressions against #435's clean slate.
          {
            echo "package synarchy"
            echo "  ghc-options: -Werror"
          } > cabal.project.local
          cabal build all --dry-run

      # plan.json exists after --dry-run; its hash keys the store cache.
      - name: Restore dependency cache
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: deps-${{ runner.os }}-ghc9.12.2-${{ hashFiles('dist-newstyle/cache/plan.json') }}
          restore-keys: deps-${{ runner.os }}-ghc9.12.2-

      # Cache the project build products so GHC recompiles only dirty
      # modules. plan.json (from the --dry-run above) exists now, so its
      # hash keys the cache alongside the GHC version; the per-commit
      # suffix makes every run save a fresh snapshot, and restore-keys
      # fall back to the most recent snapshot (same plan first, then any
      # snapshot for this GHC) for partial reuse. Combined cache action:
      # restores here, saves dist-newstyle at post-job.
      - name: Cache project build (dist-newstyle)
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: dist-${{ runner.os }}-ghc-9.12.2-cabal-3.16.1.0-${{ hashFiles('dist-newstyle/cache/plan.json') }}-${{ github.sha }}
          restore-keys: |
            dist-${{ runner.os }}-ghc-9.12.2-cabal-3.16.1.0-${{ hashFiles('dist-newstyle/cache/plan.json') }}-
            dist-${{ runner.os }}-ghc-9.12.2-cabal-3.16.1.0-

      - name: Build dependencies
        run: cabal build all --only-dependencies

      # Save the store as soon as deps are built, so a later failure in
      # the package build doesn't throw away the expensive part.
      - name: Save dependency cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: deps-${{ runner.os }}-ghc9.12.2-${{ hashFiles('dist-newstyle/cache/plan.json') }}

      - name: Build (library + executable)
        run: cabal build all

      - name: Build test suites
        run: |
          cabal build synarchy-test-headless
          cabal build synarchy-test-graphical

      - name: Headless test suite
        run: cabal test synarchy-test-headless --test-show-details=direct

      - name: Test audit
        run: python3 tools/test_audit.py

      # Cheap, no-engine guard (#538/#541/#545): fails if a Lua module
      # that was split to stay reviewable (the debug overlay,
      # unit-resource physiology, or unit-AI splits) grows back past
      # its agreed line budget.
      - name: Lua module line budget
        run: python3 tools/lua_module_budget.py

      # Worldgen regression gate — see the header comment. Baselines
      # are tracked in tools/baselines/ (#421), captured on the primary
      # dev machine (macOS/aarch64); Linux output matches them exactly.
      - name: world_check --quick
        run: python3 tools/world_check.py --quick

      # Validate the path->probe mapping wiring on every run (cheap, no
      # engine) — a broken mapping would otherwise only surface when a PR
      # mis-selects.
      - name: ci_probes self-test
        run: python3 tools/ci_probes.py --self-test

      # Path-selective, BLOCKING behavior-probe gate (#530). Only on PRs:
      # diff against the base, pick the CI-eligible probes relevant to the
      # changed files (full curated smoke set for core/unclassified changes,
      # none for docs/assets or manual-only probe areas), and run them
      # against the exe already built above.
      # --retries 1 re-runs a failed probe SOLO before failing, to absorb
      # the sequential-engine contention flakes a back-to-back run shows.
      - name: Behavior probes (path-selective)
        if: github.event_name == 'pull_request'
        run: |
          BASE='${{ github.event.pull_request.base.sha }}'
          echo "Diffing against base $BASE"
          CHANGED="$(git diff --name-only "$BASE" HEAD)"
          echo "Changed files:"; echo "$CHANGED" | sed 's/^/  /'
          ONLY="$(printf '%s\n' "$CHANGED" | python3 tools/ci_probes.py --stdin)"
          if [ -z "$ONLY" ]; then
            echo "No behavior probes selected for this change — skipping."
            exit 0
          fi
          echo "Selected probes: $ONLY"
          python3 tools/run_probes.py --only "$ONLY" --exact --retries 1
