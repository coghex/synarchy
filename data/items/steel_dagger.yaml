items:
  - name: "steel_dagger"
    display_name: "Steel Dagger"
    sprite: "assets/textures/items/weapon/dagger_steel_acolyte.png"
    weight: 0.4
    kind: weapon
    category: Weapons
    make: acolyte      # design family / crafting tradition
    material: steel    # blade material — physical props live in
                       # data/substances/metals.yaml under "steel"

    # Rolled once per spawned instance. min/max define a normal
    # distribution clamped to [min, max] (mean = midpoint, σ ≈ range/6
    # so ~99.7% of rolls land inside the band).
    quality:
      min: 50
      max: 75
    condition:
      min: 80
      max: 100

    # Weapon block — geometry + per-attack-type effectiveness. The
    # weapon's substance lives at the top-level `material` field (so
    # armor can reference materials too without a "weapon" block).
    # Combat math joins effectiveness × (1 − target_material.resistance).
    weapon:
      blade_length:       22     # cm
      base_sharpness:     200    # lower = sharper (engineering scale)
      stab_effectiveness:  0.5
      slash_effectiveness: 0.5
      blunt_effectiveness: 0.01
      length:            30     # cm total (blade + grip); the swing lever
      center_of_mass:    0.4    # balanced, slightly grip-heavy
      weapon_class:      dagger  # matches `dagger` skill on the wielder
      attack_cooldown:    1.0    # base recovery for a quick swing by a
                                 # 1.0-stat, 1.0-strength wielder at 100%
                                 # stamina with no wounds. The Lua
                                 # cooldown formula scales this by weight,
                                 # stamina, injury, and agility×dexterity.
      wielded_from:      r_arm      # which body part the swing originates
                                    # from — read by the cooldown formula
                                    # to find weapon-arm wound severity.
                                    # Must match an `id` from the wielder's
                                    # body_parts list.
