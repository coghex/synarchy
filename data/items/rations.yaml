items:
  - name: "rations"
    display_name: "Rations"
    sprite: "assets/textures/items/supply/rations.png"
    weight: 0.1        # kg per ration
    category: Supplies
    food:
      # Nutrition is a sub-object so future diet work (protein / fat /
      # carbohydrate / micronutrients) can add sibling keys beside
      # calories without restructuring the schema. `calories` marks
      # DISCRETE food (whole item per eat); bulk food declares
      # `calories_per_kg` instead (see quinoa_sack.yaml).
      nutrition:
        # kcal credited to the stomach meter per ration. 250 ≈ a small
        # meal — about 19 % of a default acolyte's daily metabolism
        # (~1318 kcal/day) and ~35 % of stomach capacity (max_hunger,
        # ~713 kcal). Five rations roughly cover a day of idle
        # metabolism.
        calories: 250
