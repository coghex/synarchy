# Raw gems — dig yields from granite (pegmatite hosts). Spawned by
# the seeded gem region field (World.Gem): one gem type per bearing
# 12x12-tile region, so finds cluster into pockets. Weights are
# per-instance rolls ({mean, range} = truncated normal) — every find
# is a different crystal. Textures pending (missing-texture
# placeholder until then). Rarity tier lives in World.Gem's table;
# this file is just the item defs.
