buildings:
  - name: "furnace"
    display_name: "Furnace"
    category: "Production"
    description: "A granite smelting furnace. Runs smelt recipes (ore + fuel to metal) and restores the condition of worn equipment."
    sprite: "assets/textures/buildings/furnace/default.png"
    tile_size: { x: 1, y: 1 }
    placement: "flat_ground"
    race: "acolyte_cult"

    # Worker-seconds at the solo rate (same scaling as cargo_hold_S:
    # n^2 up to 3 workers, log taper above).
    build_work: 180.0

    # Required materials — gated before any progress can accrue.
    # Stone body + steel reinforcement; granite chunks come out of any
    # dig/mine designation, bars from the spawn loadout (or, once this
    # furnace stands, from its own smelt recipes).
    materials:
      granite_chunk: 6
      steel_bar:     2

    # Staging space for craft inputs/fuel and outputs (kg). Uses the
    # ordinary building-storage system (deposit/withdraw) — the craft
    # AI (#329) stages here; craft.executeAt itself consumes from the
    # crafter's inventory.
    storage_capacity: 100.0

    # Work-station operations (#326). Recipe `station` kinds this
    # building can run, plus "repair_condition" for the repair flows
    # (#301): condition restoration (reforging) happens at the
    # furnace; edge honing ("repair_sharpness") lives at the workbench
    # instead — the two axes are split operations so findStation/
    # executeAt routes to the right station instead of either matching
    # a shared generic "repair" tag.
    operations:
      - smelt
      - repair_condition

    # While materials aren't satisfied the building renders as a
    # translucent ghost (uses default.png with 0.6 alpha). Once they
    # arrive, the construction anim plays through these 8 frames,
    # tracking build progress directly (build_work > 0 — see
    # Building.Render.pickBuildingFrame) rather than real time, so fps
    # only matters if bdBuildWork were ever dropped to 0. With no
    # "built" anim defined, the engine pins frame 8 as the built
    # sprite — same picture, no snap.
    state_animations:
      appearing: furnace-construct

    animations:
      furnace-construct:
        fps: 4
        loop: false
        frames:
          default:
            - "assets/textures/buildings/furnace/construct/frame_001.png"
            - "assets/textures/buildings/furnace/construct/frame_002.png"
            - "assets/textures/buildings/furnace/construct/frame_003.png"
            - "assets/textures/buildings/furnace/construct/frame_004.png"
            - "assets/textures/buildings/furnace/construct/frame_005.png"
            - "assets/textures/buildings/furnace/construct/frame_006.png"
            - "assets/textures/buildings/furnace/construct/frame_007.png"
            - "assets/textures/buildings/furnace/construct/frame_008.png"
