flora:
  - name: bracken_fern
    type: deciduous_shrub
    texDir: "assets/textures/world/flora/bracken_fern"
    lifecycle: perennial
    minLife: 1800
    maxLife: 7200
    deathChance: 0.05
    phases:
      - tag: sprout
        texture: "sprout.png"
        age: 0
      - tag: matured
        texture: "matured.png"
        age: 360
      - tag: dead
        texture: "dead.png"
        age: 7200
    annualCycle:
      - tag: dormant
        startDay: 0
        texture: "matured_dormant.png"
      - tag: budding
        startDay: 60
        texture: "matured_budding.png"
      - tag: flowering
        startDay: 120
        texture: "matured_flowering.png"
      - tag: senescing
        startDay: 240
        texture: "matured_senescing.png"
    cycleOverrides:
      - phase: sprout
        cycle: dormant
        texture: "sprout_dormant.png"
      - phase: sprout
        cycle: budding
        texture: "sprout_budding.png"
      - phase: sprout
        cycle: senescing
        texture: "sprout_senescing.png"
      - phase: dead
        cycle: dormant
        texture: "dead.png"
      - phase: dead
        cycle: budding
        texture: "dead.png"
      - phase: dead
        cycle: flowering
        texture: "dead.png"
      - phase: dead
        cycle: senescing
        texture: "dead.png"
    worldGen:
      category: bush
      minTemp: -8
      maxTemp: 28
      idealTemp: 14
      minPrecip: 0.3
      maxPrecip: 1.0
      idealPrecip: 0.7
      minAlt: 0
      maxAlt: 700
      idealAlt: 150
      minHumidity: 0.3
      maxHumidity: 0.95
      idealHumidity: 0.65
      maxSlope: 4
      density: 0.3
      footprint: 8

