# Crafting recipes (#325). Loaded at startup via engine.loadRecipeYaml
# into the engine RecipeManager; queried + executed through the craft.*
# Lua API.
#
# Schema (one entry under `recipes:`):
#   id:        unique recipe key                          (required)
#   name:      display name                               (default: id)
#   station:   station operation, e.g. "smelt"/"forge"    (required)
#              — matched against a building def's `operations:` list
#              (#326): craft.executeAt only runs at a Built building
#              offering it (furnace = smelt+repair_condition,
#              workbench = forge+assemble+repair_sharpness)
#   inputs:    list of { item, count }; count defaults 1  (required)
#   fuel:      optional single { item, count } consumed alongside the
#              inputs (fuel item content arrives with the smelting
#              tier, #327)
#   work:      effort to complete; data for the craft AI (#329),
#              craft.execute itself is instant             (default: 0)
#   outputs:   list of { item, count }; count defaults 1  (required)
#   knowledge: optional knowledge the crafter must KNOW (present in
#              uiKnowledge) for craft.execute to run
#   skill:     optional crafter skill that sets output quality (#343):
#              quality = skill level, blended 70/30 with the knowledge
#              level when the recipe is knowledge-gated, clamped 0-100.
#              Omitted = quality rolls from the item def's spec.
#   repair_axis: optional "condition"/"sharpness" (#301) — marks this a
#              REPAIR recipe run through repair.repairAt (targets an
#              existing item instance) rather than craft.execute/
#              executeAt, which refuse repair-tagged recipes. See
#              data/recipes/repair.yaml.
#   output_temp: optional °C (#344/#346) — outputs spawn with this
#              tracked temperature instead of ambient (e.g. 100 for
#              fresh-brewed coffee). Omitted = ambient, the historical
#              default.
#   power_draw: optional watts this recipe demands from its station
#              WHILE being worked (#590). Omitted/0 (default, every
#              recipe here) = never power-gated, runs at any Built
#              station regardless of the power grid. Positive = the
#              craft AI's work-pour stalls (without losing progress or
#              consuming inputs) whenever the station's network can't
#              cover it; craft.executeAt/repair.repairAt refuse outright
#              with a "no power" reason. This is the job-dependent load
#              — see Building.Types.bdPowerDrain for the (currently
#              unused by any craft station) building-level always-on
#              alternative.
#
# Outputs spawn factory-new: condition + sharpness 100.
recipes:
  - id: forge_steel_dagger
    name: "Forge Steel Dagger"
    station: forge
    skill: smithing
    inputs:
      - item: steel_bar
        count: 2
    work: 20
    outputs:
      - item: steel_dagger
