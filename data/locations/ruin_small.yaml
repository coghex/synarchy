# Location definitions: premade structures stamped into the world.
#
# Loaded at boot by engine.loadLocationYaml (after items / units /
# buildings — locations load LAST so their content ids can be resolved
# against the other registries later, in #90). Each entry registers a
# LocationDef; the `builder` names a Lua function in scripts/locations.lua
# that authors the geometry when the location is stamped.
#
# `contents` ids are resolved at spawn time (#90), not here — an unknown
# id or kind logs a warning and is skipped rather than crashing.
locations:
  - id: ruin_small
    label: "Small Ruin"
    type: ruin
    # Lua builder (scripts/locations.lua `builders.room_small_damaged`,
    # #91): a partially-collapsed 5x5 RCT-style room — damaged-variant
    # floor / posts / walls, a walkable breach in the perimeter, one
    # corner post gone, no ceiling.
    builder: room_small_damaged
    # Terrain placement constraint tags read by the world-gen overlay
    # (#89) to filter candidate chunks. The room wants flat ground.
    anchor: [flat]
    # Authoritative spatial contract (#777): an inclusive, axis-aligned
    # tile box relative to the anchor. This IS the 5x5 footprint — the
    # builder (room_small_damaged) and the content scatter below both
    # derive their geometry from these bounds; there is no separate
    # Lua-side radius constant to keep in sync. discovery_margin is the
    # tile halo later discovery-trigger work (#780) expands the bounds
    # by before a unit is considered "near" the ruin.
    bounds: { min_x: -2, min_y: -2, max_x: 2, max_y: 2 }
    discovery_margin: 6
    # Paired zoom-map annotation textures (#781): 'undiscovered' shows
    # while wgpLocationDiscovered hasn't recorded this placement yet,
    # 'discovered' once a player-faction unit has approached it (#780).
    map_icons:
      undiscovered: "assets/textures/icons/location/ruin_hidden.png"
      discovered: "assets/textures/icons/location/ruin_discovered.png"
    # World-gen overlay (#89) placement controls. Per-type, not global:
    # at most `max_count` instances, each at least `min_spacing` chunks
    # from another ruin (jittered, deterministic from the seed). Both are
    # optional (defaults: max_count 4, min_spacing 4).
    max_count: 6
    min_spacing: 5
    # Content spawned once, the first time this location's chunk loads
    # (#90). Fixed-position entries land at that exact anchor offset;
    # entries without `position` scatter randomly within the room.
    # A scavenge scene (#91): a dead radio and a dropped canteen where
    # the occupants left them, plus 2 rolls of common ruin loot. Units
    # in ruins are a future issue — none here by design.
    contents:
      - { kind: item, id: radio, count: 1, position: {x: -1, y: -1} }
      - { kind: item, id: canteen_steel_2l, count: 1, position: {x: 1, y: 0} }
      - { kind: loot_table, id: ruin_common, rolls: 2 }
