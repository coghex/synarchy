units:
  - name: "acolyte"
    sprite: "assets/textures/units/acolyte/default.png"
    base_width: 8
    equipment_class: "humanoid"

    eager_stats: true
    stats:
      strength:     { base: 1.0, range: 1.0 }
      endurance:    { base: 1.0, range: 1.0 }
      reflexes:     { base: 1.0, range: 1.0 }
      constitution: { base: 1.0, range: 1.0 }
      # Per-unit multiplier on the body-derived BMR. Range 0.4 → sigma
      # 0.1 → ~95% of units roll in [0.8, 1.2], so individuals differ
      # by up to ±20% in baseline calorie burn at rest.
      metabolism:   { base: 1.0, range: 0.4 }
      # Mental — display category only; engine treats it as a regular stat.
      perception:   { base: 1.0, range: 0.4 }

    body:
      height:  { mean: 1.8, range: 1.0 }   # 1.3..2.3 m
      bulk:    { mean: 1.0, range: 1.0 }   # 0.5..1.5
      bodyfat: { mean: 0.2, range: 0.36 }  # 0.02..0.38

    skills:
      balance: { base: 1.0, range: 1.0 }

    # Default supplies every acolyte spawns with — full canteen and
    # two rations. building_spawn.lua used to grant these per-portal-
    # spawn via unit.addItem; since the unit-info v2 inventory tab
    # needs to actually SHOW them for debug-spawned units too, the
    # baseline lives on the def now. Adjust if you want bare debug
    # spawns again.
    starting_inventory:
      - { item: "canteen_steel_2l", fill: 2.0 }
      - { item: "rations" }
      - { item: "rations" }
      - { item: "pick_steel" }
      - { item: "shovel_steel" }
      - { item: "axe_steel" }
      - { item: "radio" }
      # Construction materials — each acolyte carries half a cargo
      # hold's requirement, so any two with the right mix can finish
      # one build. The delivery-AI claim system keeps duplicates from
      # walking in (the second acolyte sees reduced remaining need).
      - { item: "steel_plate",     count: 5 }
      - { item: "steel_bar",       count: 12 }
      - { item: "steel_hardware",  count: 5 }
      - { item: "electric_motor",  count: 1 }
      - { item: "processing_unit", count: 1 }

    # Combat equipment seeded into the matching slots at spawn. Each
    # entry's item kind must match the slot's accepted kind (see
    # data/equipment/humanoid.yaml). Other slots (helmet, greaves,
    # left_hand) start empty.
    starting_equipment:
      armor:      "wool_gambeson"
      gauntlets:  "leather_gloves"
      boots:      "leather_boots"
      right_hand: "steel_dagger"

    # Accessories — items worn off the silhouette grid. Order matters
    # only for tooltip ordering; equipment.equipAccessory appends.
    starting_accessories:
      - "acolyte_habit"
      - "technogoggles"

    directional_sprites:
      S:  "assets/textures/units/acolyte/default.png"
      SW: "assets/textures/units/acolyte/sw.png"
      W:  "assets/textures/units/acolyte/w.png"
      NW: "assets/textures/units/acolyte/nw.png"
      N:  "assets/textures/units/acolyte/n.png"
      NE: "assets/textures/units/acolyte/ne.png"
      E:  "assets/textures/units/acolyte/e.png"
      SE: "assets/textures/units/acolyte/se.png"

    state_animations:
      # Pose-keyed; key format is "<pose>-<activity>" or
      # "<from>-to-<to>" for transitions. Unmatched keys fall back to
      # T-pose, so omitting a (pose, activity) pair is safe.
      standing-idle:         idle-standing
      standing-walk:         walk
      standing-drink:        drinking
      # Eating reuses the drinking anim for v1 — same "head-down,
      # raise something to the mouth" motion. A dedicated eat anim
      # can be authored later and swapped in here.
      standing-eat:          drinking
      standing-pickup:       picking-up
      crouching-idle:        idle-crouching
      crawling-idle:         idle-crawling
      collapsed-idle:        idle-collapsed
      # Dead reuses the collapsed corpse frame — no decomposition anim
      # yet. The pose differs (Dead, not Collapsed) so AI / revive
      # logic can distinguish them, but visually they're identical.
      dead-idle:             idle-collapsed
      # Pose transitions. The forward asset is reused for the reverse
      # direction — publishToRender flips uiAnimReverse when the
      # target pose has lower depth than the current pose.
      standing-to-crouching: standing-to-crouching
      crouching-to-standing: standing-to-crouching
      crouching-to-crawling: crouching-to-crawling
      crawling-to-crouching: crouching-to-crawling
      crawling-to-collapsed: crawling-to-collapsed
      collapsed-to-crawling: crawling-to-collapsed

    animations:
      idle-standing:
        fps: 4
        loop: true
