    # Acolytes have no innate hide resistance (just skin). Default
    # block is all-zero, so we omit it here for brevity.

    # No natural_weapon — acolytes fight with equipped weapons.

    # Default supplies every acolyte spawns with — full canteen and
    # two rations. building_spawn.lua used to grant these per-portal-
    # spawn via unit.addItem; since the unit-info v2 inventory tab
    # needs to actually SHOW them for debug-spawned units too, the
    # baseline lives on the def now. Adjust if you want bare debug
    # spawns again.
    # drop_priority: if a weak roll's carrying_capacity can't fit the
    # full loadout (worn gear + fill all count), the spawn check sheds
    # the highest priority first — pick, then shovel. Everything else
    # (survival kit, armor, weapons) always arrives.
    starting_inventory:
      - { item: "canteen_steel_2l", fill: 2.0 }
      - { item: "rations" }
      - { item: "rations" }
      - { item: "pick_steel",   drop_priority: 2 }
      - { item: "shovel_steel", drop_priority: 1 }
      - { item: "axe_steel" }
      - { item: "radio" }
      # Construction materials live on the technomule (see
      # technomule.yaml) — acolytes carry only their personal kit
      # and fetch build materials from the mule when their own
      # inventory comes up short.

    # Combat equipment seeded into the matching slots at spawn. Each
    # entry's item kind must match the slot's accepted kind (see
    # data/equipment/humanoid.yaml). Other slots (helmet, greaves,
    # left_hand) start empty.
    starting_equipment:
      armor:      "wool_gambeson"
      gauntlets:  "leather_gloves"
      boots:      "leather_boots"
      right_hand: "steel_dagger"

    # Accessories — items worn off the silhouette grid. Order matters
    # only for tooltip ordering; equipment.equipAccessory appends.
    starting_accessories:
      - "acolyte_habit"
      - "technogoggles"

    # Per-direction T-pose. Sourced from each direction's idle frame
    # 0 — gives the engine a still sprite to fall back to when no
    # animation is active. SW / W / NW are mirrored from SE / E / NE.
    directional_sprites:
      south:      "assets/textures/units/acolyte/animations/idle/south/frame_000.png"
      south-east: "assets/textures/units/acolyte/animations/idle/south-east/frame_000.png"
      east:       "assets/textures/units/acolyte/animations/idle/east/frame_000.png"
      north-east: "assets/textures/units/acolyte/animations/idle/north-east/frame_000.png"
      north:      "assets/textures/units/acolyte/animations/idle/north/frame_000.png"

    state_animations:
      # Pose-keyed; key format is "<pose>-<activity>" or
      # "<from>-to-<to>" for transitions. Engine keys these; the
      # values reference the underscored anim names in the
      # `animations:` block below.
      standing-idle:         idle
      standing-walk:         walk
      standing-run:          run
      standing-drink:        drink
      standing-eat:          drink           # one anim serves both
      standing-pickup:       pickup
      crouching-idle:        crouching_idle
      crawling-idle:         crawling_idle
      crawling-walk:         crawling
      collapsed-idle:        injured_collapse  # holds the last frame
      dead-idle:             death             # same — last frame
      # Pose transitions. Forward asset reused for the reverse direction
      # (engine flips uiAnimReverse when target pose is shallower).
      standing-to-crouching: standing_to_crouching
      crouching-to-standing: standing_to_crouching
      standing-to-crawling:  standing_to_crawling
      crawling-to-standing:  standing_to_crawling
      standing-to-collapsed: standing_to_collapsed
      collapsed-to-standing: standing_to_collapsed
      crouching-to-crawling: crouching_to_crawling
      crawling-to-crouching: crouching_to_crawling
      crawling-to-collapsed: crawling_to_collapsed
      collapsed-to-crawling: crawling_to_collapsed

      # Climbing. Engine triggers Standing → Climbing automatically
      # when a movement step hits a cliff (Z increases AND the
      # destination tile has no slope facing back to the source).
      # The Climbing transition's duration scales with the Z delta
      # at climbSpeedZ tiles/sec (see Unit.Thread.Movement).
      # At the top, engine auto-chains Climbing → Crawling → Standing
      # via usPostTransition, so you get pull-up then stand-up in one
      # sequence without AI orchestration.
      climbing-idle:           climb_idle
      climbing-walk:           climb           # ascent loop
      standing-to-climbing:    climb           # the long ascent itself
      climbing-to-crawling:    climb_pullup    # pull-up over the edge
      # crawling-to-standing (above) provides the final stand-up.

      # Falling. Engine triggers Standing → Falling when a movement
      # step drops dz ≥ fallTriggerDz (currently 2). The Falling
      # transition's duration scales with the drop distance at
      # fallSpeedZ tiles/sec. At impact, the engine reads usFallImpact
      # (= dz × body_mass/50 / toughness) and picks the outcome:
      #   * impact ≤ 1.5  → no anim chain, walks off (acolyte dz=1).
      #   * impact ≤ 5.0  → Falling → Collapsed (landing anim plays
      #                     as the transition; Lua revives later via
      #                     the collapsed-to-standing path).
      #   * impact > 5.0  → snaps to Dead pose, death anim plays.
      falling-idle:            falling         # held mid-air if ever stable
      standing-to-falling:     falling         # the descent loop
      falling-to-collapsed:    landing         # landing → collapse
      # falling-to-dead isn't needed — lethal falls go straight to
      # Dead pose, which resolves via dead-idle → death (already wired).

      # Injured variants — engine swaps to these when cumulative wound
      # severity > 1.0 (see publishToRender's injured-key fallback).
      # Combat anims (combat_idle, attack_quick, attack_heavy,
      # combat_hit_react) are NOT state-keyed; they're picked Lua-side
      # via unit.setAnimOverride and combatAnimName handles the
      # injured prefix there.
      injured-standing-idle:   injured_idle
      injured-standing-walk:   injured_walk
      injured-standing-run:    injured_run
      injured-standing-drink:  injured_drink
      injured-standing-pickup: injured_pickup
      injured-dead-idle:       injured_death

