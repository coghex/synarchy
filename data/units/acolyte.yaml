units:
  - name: "acolyte"
    sprite: "assets/textures/units/acolyte/animations/idle/south/frame_000.png"
    base_width: 8
    # Top sprint speed in tiles/sec. AI candidates derive walk /
    # commanded / retreat speeds as fractions of this. Stat-based
    # modulation lives in unit_ai's combat-speed helper.
    # Calibrated for 1 tile ≈ 1 m, matches real human walk speed.
    #   wander  = 0.5× → 0.70 t/s
    #   command = 0.7× → 0.98 t/s
    #   retreat = 1.0× → 1.40 t/s
    max_speed: 1.4
    equipment_class: "humanoid"

    eager_stats: true
    stats:
      # Core physical
      strength:     { base: 1.0, range: 1.0 }
      endurance:    { base: 1.0, range: 1.0 }
      reflexes:     { base: 1.0, range: 1.0 }
      constitution: { base: 1.0, range: 1.0 }
      # Per-unit multiplier on the body-derived BMR. Range 0.4 → sigma
      # 0.1 → ~95% of units roll in [0.8, 1.2], so individuals differ
      # by up to ±20% in baseline calorie burn at rest.
      metabolism:   { base: 1.0, range: 0.4 }
      perception:   { base: 1.0, range: 0.4 }
      # Combat stats (Phase 2.1). Mean 1.0 with range 0.4 → sigma 0.1,
      # 95% of rolls in [0.8, 1.2]. Combat formulas use these directly
      # in hit/evasion/damage calculations.
      dexterity:    { base: 1.0, range: 0.4 }   # fine motor: aim, parry
      agility:      { base: 1.0, range: 0.4 }   # gross motor: dodge
      intelligence: { base: 1.0, range: 0.6 }   # tactical body-part pick
      toughness:    { base: 1.0, range: 0.4 }   # flat damage reduction
      # (`balance` is a skill, not a stat — see the skills: block.)

    body:
      height:  { mean: 1.8, range: 1.0 }   # 1.3..2.3 m
      bulk:    { mean: 1.0, range: 1.0 }   # 0.5..1.5
      bodyfat: { mean: 0.2, range: 0.36 }  # 0.02..0.38

    skills:
      # Weapon-class skills. Skill XP applied on use (Phase 2.2+).
      # Range 30 → wide initial spread; most rolls fall in [40, 60].
      dagger:  { base: 50.0, range: 30.0 }
      unarmed: { base: 30.0, range: 20.0 }
      # Balance: trained skill (climbing, dodging, footing on uneven
      # terrain). Read by Combat.Resolution's defender evasion via
      # uiSkills["balance"], normalised by /50 so a level-50 skill
      # contributes the same as the previous "stat at 1.0".
      balance: { base: 50.0, range: 40.0 }
      # Climbing: incremented by the engine on every successful climb
      # via diminishing-returns curve. Affects slip chance and climb
      # speed. Acolytes are not professional climbers — start low.
      climbing: { base: 10.0, range: 10.0 }
      # Mining: scales dig speed (with strength) in the dig AI's
      # world.digTile amount — factor = strength · (0.5 + mining/100),
      # so level 50 ≈ baseline, level 0 digs at half rate. Gains XP
      # per completed tile (dig_xp_per_tile in unit_ai params).
      # Acolytes arrive as novice excavators — wide spread.
      mining:  { base: 25.0, range: 30.0 }

    # Knowledge the acolyte spawns KNOWING (gated training — a unit only
    # advances a knowledge it possesses; others stay "Unknown" until learned
    # from a book/teacher). Rolled like a skill. Effective capability at the
    # point of use = level × the relevant stat (e.g. intelligence for the
    # quality of a suture/bandage). Range 40 → wide spread, most in [30,70].
    knowledge:
      bleed_control: { base: 50.0, range: 40.0 }

    # 12-part humanoid body. Heights are metres above the foot,
    # calibrated for a 1.8m default body — taller spawns naturally
    # have parts higher on the ladder via uiStats["height"] but for
    # 2.1 the YAML values are used directly. Area weights bias
    # toward the torso; tactical values guide high-intelligence
    # attackers to vitals. Vital parts at severity ≥ 1.0 = death.
    body_parts:
      # Tissue layers (outer→inner; thickness mm). The skull turns
      # blades but a heavy/blunt blow transmits to the brain; the soft
      # neck has no bone, which is what makes throats deadly; ribs give
      # the torso partial cover before the organs.
      # ---- HEAD (targetable) + subparts. NOTHING here is "vital" (only the
      # heart is) — a destroyed brain or a severed head kills via blood loss
      # / nervous-system shutdown in the survival tick, not instantly.
      - { id: head, name: "head", parent: cervical_spine, vital: false, targetable: true,
          area_weight: 0.08, tactical_value: 1.0,
          bleed_factor: 2.0,
          height_low: 1.65, height_high: 1.85,
          layers: [ { name: scalp, material: flesh, thickness: 3 },
                    { name: skull, material: bone,  thickness: 7 },
                    { name: brain, material: nerve, thickness: 80 } ] }
      # 50/50 skull-vs-jaw on a blunt fracture; the brain (concussion) is a
      # separate subpart hit regardless of which bone broke.
      - { id: skull, name: "skull", parent: head, targetable: false, vital: false, depth: 0.25,
          area_weight: 0.55, bleed_factor: 1.5,
          layers: [ { name: scalp, material: flesh, thickness: 3 },
                    { name: skull, material: bone,  thickness: 7 } ] }
      - { id: jaw, name: "jaw", parent: head, targetable: false, vital: false, depth: 0.25,
          area_weight: 0.45, bleed_factor: 1.2,
          layers: [ { name: skin,   material: flesh, thickness: 3 },
                    { name: muscle, material: flesh, thickness: 4 },
                    { name: jaw,    material: bone,  thickness: 6 } ] }
      # The brain sits BEHIND the skull bone — a strike must beat the bone
      # to reach it (blunt transmits → concussion; a blade mostly turned).
      - { id: brain, name: "brain", parent: head, targetable: false, vital: false, depth: 0.6,
          area_weight: 0.30, bleed_factor: 1.0,
          layers: [ { name: scalp, material: flesh, thickness: 3 },
                    { name: skull, material: bone,  thickness: 7 },
                    { name: brain, material: nerve, thickness: 60 } ] }
      # ---- NECK (targetable) + subparts (front→back by depth) ----
      - { id: neck, name: "neck", parent: torso, vital: false, targetable: true,
          area_weight: 0.03, tactical_value: 1.0,
          bleed_factor: 3.0,
          height_low: 1.55, height_high: 1.65,
          layers: [ { name: skin,     material: flesh, thickness: 10 },
                    { name: muscle,   material: flesh, thickness: 20 },
                    { name: vertebra, material: bone,  thickness: 12 } ] }
      - { id: windpipe, name: "windpipe", parent: neck, targetable: false, vital: false, depth: 0.15,
          area_weight: 0.40, bleed_factor: 1.0,
          layers: [ { name: skin,     material: flesh,     thickness: 8 },
                    { name: windpipe, material: cartilage, thickness: 6 } ] }
      - { id: carotid, name: "carotid artery", parent: neck, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.30, bleed_factor: 6.0,
          layers: [ { name: skin, material: flesh,  thickness: 8 },
                    { name: fat,  material: flesh,  thickness: 4 },
                    { name: "carotid artery", material: artery, thickness: 4 } ] }
      - { id: cervical_spine, name: "spine", parent: neck, targetable: false, vital: false, depth: 0.80,
          area_weight: 0.30, bleed_factor: 1.5,
          layers: [ { name: skin,         material: flesh, thickness: 8 },
                    { name: muscle,       material: flesh, thickness: 12 },
                    { name: vertebra,     material: bone,  thickness: 14 },
                    { name: "spinal cord", material: nerve, thickness: 8 } ] }
      # ---- TORSO (root, targetable) + organ subparts. Organ SEPARATION
      # (regions / deep multi-organ series) is a V2 goal — for now a torso
      # hit lands in ONE organ (weighted by size). Only the HEART is vital
      # (instant death). Other organ damage kills later via the survival
      # tick (blood loss / suffocation / shock). Torso = root, never severed.
      # Part durability is derived from the tissue layers below (no
      # max_health_factor); the representative layers also set the strike's
      # REACH, so deep organs (depth 0.5) stay reachable.
      - { id: torso, name: "torso", parent: null, vital: false, targetable: true,
          area_weight: 0.40, tactical_value: 0.8,
          bleed_factor: 2.0,
          height_low: 1.00, height_high: 1.55,
          layers: [ { name: skin,   material: flesh, thickness: 25 },
                    { name: ribs,   material: bone,  thickness: 12 },
                    { name: organs, material: organ, thickness: 100 } ] }
      # bone shell (depth 0.2)
      - { id: ribcage, name: "ribcage", parent: torso, targetable: false, vital: false, depth: 0.20,
          area_weight: 0.50, bleed_factor: 1.5,
          layers: [ { name: skin, material: flesh, thickness: 12 }, { name: muscle, material: flesh, thickness: 8 }, { name: ribs, material: bone, thickness: 12 } ] }
      - { id: sternum, name: "sternum", parent: torso, targetable: false, vital: false, depth: 0.20,
          area_weight: 0.15, bleed_factor: 1.2,
          layers: [ { name: skin, material: flesh, thickness: 10 }, { name: sternum, material: bone, thickness: 18 } ] }
      - { id: pelvis,  name: "pelvis", parent: torso, targetable: false, vital: false, depth: 0.20,
          area_weight: 0.35, bleed_factor: 2.0,
          layers: [ { name: skin, material: flesh, thickness: 15 }, { name: muscle, material: flesh, thickness: 10 }, { name: pelvis, material: bone, thickness: 30 } ] }
      # organs (depth 0.5 — one per hit, behind the rib bone)
      # DESIGN: heart-only vitality. ONLY the heart is `vital: true`. This is
      # deliberate — destroying the brain / severing the neck / etc. does NOT
      # instakill; the unit survives the moment (treatment-window conceit) and
      # dies seconds later via the delayed failure meters (neuro/shock/
      # suffocation/organ in unit_resources.lua) unless treated. Do not flag
      # brain/spine/aorta vital. (Other creatures may have multiple vital
      # parts in their own YAML — a robot, say.)
      - { id: heart, name: "heart", parent: torso, targetable: false, vital: true, depth: 0.50,
          area_weight: 0.06, bleed_factor: 4.0,
          layers: [ { name: skin, material: flesh, thickness: 25 }, { name: ribs, material: bone, thickness: 12 },
                    { name: heart, material: organ, thickness: 60 } ] }
      - { id: lungs, name: "lung", parent: torso, targetable: false, vital: false, depth: 0.50,
          area_weight: 0.20, bleed_factor: 2.5,
          layers: [ { name: skin, material: flesh, thickness: 22 }, { name: ribs, material: bone, thickness: 12 },
                    { name: lung, material: organ, thickness: 50 } ] }
      - { id: liver, name: "liver", parent: torso, targetable: false, vital: false, depth: 0.50,
          area_weight: 0.15, bleed_factor: 3.0,
          layers: [ { name: skin, material: flesh, thickness: 25 }, { name: liver, material: organ, thickness: 60 } ] }
      - { id: stomach, name: "stomach", parent: torso, targetable: false, vital: false, depth: 0.50,
          area_weight: 0.15, bleed_factor: 2.0,
          layers: [ { name: skin, material: flesh, thickness: 25 }, { name: stomach, material: organ, thickness: 50 } ] }
      - { id: intestines, name: "intestines", parent: torso, targetable: false, vital: false, depth: 0.50,
          area_weight: 0.30, bleed_factor: 1.8,
          layers: [ { name: skin, material: flesh, thickness: 25 }, { name: intestines, material: organ, thickness: 80 } ] }
      - { id: kidneys, name: "kidney", parent: torso, targetable: false, vital: false, depth: 0.50,
          area_weight: 0.10, bleed_factor: 3.0,
          layers: [ { name: skin, material: flesh, thickness: 30 }, { name: rib, material: bone, thickness: 6 },
                    { name: kidney, material: organ, thickness: 40 } ] }
      - { id: aorta, name: "aorta", parent: torso, targetable: false, vital: false, depth: 0.50,
          area_weight: 0.04, bleed_factor: 7.0,
          layers: [ { name: skin, material: flesh, thickness: 30 }, { name: vertebra, material: bone, thickness: 8 },
                    { name: aorta, material: artery, thickness: 8 } ] }
      # spine (depth 0.85 — deepest)
      - { id: thoracic_spine, name: "spine", parent: torso, targetable: false, vital: false, depth: 0.85,
          area_weight: 0.5, bleed_factor: 1.5,
          layers: [ { name: muscle, material: flesh, thickness: 25 }, { name: vertebra, material: bone, thickness: 16 },
                    { name: "spinal cord", material: nerve, thickness: 10 } ] }
      - { id: lumbar_spine, name: "spine", parent: torso, targetable: false, vital: false, depth: 0.85,
          area_weight: 0.5, bleed_factor: 1.5,
          layers: [ { name: muscle, material: flesh, thickness: 30 }, { name: vertebra, material: bone, thickness: 18 },
                    { name: "spinal cord", material: nerve, thickness: 10 } ] }

      # ---- ARMS (targetable) → bicep + forearm (share depth 0.3, one per
      # hit). Skeleton chain bicep(humerus) → forearm(radius/ulna) → hand,
      # so severing the bicep takes the whole arm below it.
      - { id: l_arm, name: "left arm", parent: torso, vital: false, targetable: true,
          area_weight: 0.07, tactical_value: 0.3,
          bleed_factor: 1.0, height_low: 0.90, height_high: 1.50,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 26 }, { name: bone, material: bone, thickness: 25 } ] }
      - { id: l_bicep, name: "bicep", parent: l_arm, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.5, bleed_factor: 1.2,
          layers: [ { name: skin, material: flesh, thickness: 3 }, { name: fat, material: flesh, thickness: 6 }, { name: muscle, material: flesh, thickness: 22 }, { name: humerus, material: bone, thickness: 25 } ] }
      - { id: l_forearm, name: "forearm", parent: l_bicep, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.5, bleed_factor: 1.0,
          layers: [ { name: skin, material: flesh, thickness: 3 }, { name: fat, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 18 }, { name: radius, material: bone, thickness: 12 }, { name: ulna, material: bone, thickness: 12 } ] }
      - { id: r_arm, name: "right arm", parent: torso, vital: false, targetable: true,
          area_weight: 0.07, tactical_value: 0.3,
          bleed_factor: 1.0, height_low: 0.90, height_high: 1.50,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 26 }, { name: bone, material: bone, thickness: 25 } ] }
      - { id: r_bicep, name: "bicep", parent: r_arm, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.5, bleed_factor: 1.2,
          layers: [ { name: skin, material: flesh, thickness: 3 }, { name: fat, material: flesh, thickness: 6 }, { name: muscle, material: flesh, thickness: 22 }, { name: humerus, material: bone, thickness: 25 } ] }
      - { id: r_forearm, name: "forearm", parent: r_bicep, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.5, bleed_factor: 1.0,
          layers: [ { name: skin, material: flesh, thickness: 3 }, { name: fat, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 18 }, { name: radius, material: bone, thickness: 12 }, { name: ulna, material: bone, thickness: 12 } ] }

      # ---- HANDS (targetable; parent = forearm so a severed forearm takes
      # the hand). Palm + 5 digits share depth 0.2 → one per hit.
      - { id: l_hand, name: "left hand", parent: l_forearm, vital: false, targetable: true,
          area_weight: 0.03, tactical_value: 0.4,
          bleed_factor: 1.0, height_low: 0.80, height_high: 1.00,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 11 }, { name: bone, material: bone, thickness: 10 } ] }
      - { id: l_palm,   name: "palm",          parent: l_hand, targetable: false, depth: 0.2, area_weight: 0.5,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 8 }, { name: bone, material: bone, thickness: 8 } ] }
      - { id: l_thumb,  name: "thumb",         parent: l_hand, targetable: false, depth: 0.2, area_weight: 0.12,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 5 } ] }
      - { id: l_index,  name: "index finger",  parent: l_hand, targetable: false, depth: 0.2, area_weight: 0.10,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: l_middle, name: "middle finger", parent: l_hand, targetable: false, depth: 0.2, area_weight: 0.10,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: l_ring,   name: "ring finger",   parent: l_hand, targetable: false, depth: 0.2, area_weight: 0.09,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: l_pinky,  name: "little finger", parent: l_hand, targetable: false, depth: 0.2, area_weight: 0.09,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: bone, material: bone, thickness: 3 } ] }
      - { id: r_hand, name: "right hand", parent: r_forearm, vital: false, targetable: true,
          area_weight: 0.03, tactical_value: 0.4,
          bleed_factor: 1.0, height_low: 0.80, height_high: 1.00,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 11 }, { name: bone, material: bone, thickness: 10 } ] }
      - { id: r_palm,   name: "palm",          parent: r_hand, targetable: false, depth: 0.2, area_weight: 0.5,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 8 }, { name: bone, material: bone, thickness: 8 } ] }
      - { id: r_thumb,  name: "thumb",         parent: r_hand, targetable: false, depth: 0.2, area_weight: 0.12,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 5 } ] }
      - { id: r_index,  name: "index finger",  parent: r_hand, targetable: false, depth: 0.2, area_weight: 0.10,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: r_middle, name: "middle finger", parent: r_hand, targetable: false, depth: 0.2, area_weight: 0.10,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: r_ring,   name: "ring finger",   parent: r_hand, targetable: false, depth: 0.2, area_weight: 0.09,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: muscle, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: r_pinky,  name: "little finger", parent: r_hand, targetable: false, depth: 0.2, area_weight: 0.09,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: fat, material: flesh, thickness: 1 }, { name: bone, material: bone, thickness: 3 } ] }

      # ---- LEGS (targetable) → thigh + knee + shin (share depth 0.3, one
      # per hit). Skeleton chain thigh(femur) → shin(tibia/fibula) → foot.
      - { id: l_leg, name: "left leg", parent: torso, vital: false, targetable: true,
          area_weight: 0.10, tactical_value: 0.3,
          bleed_factor: 1.0, height_low: 0.00, height_high: 0.90,
          layers: [ { name: skin, material: flesh, thickness: 5 }, { name: muscle, material: flesh, thickness: 35 }, { name: bone, material: bone, thickness: 35 } ] }
      - { id: l_thigh, name: "thigh", parent: l_leg, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.45, bleed_factor: 1.5,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: fat, material: flesh, thickness: 10 }, { name: muscle, material: flesh, thickness: 30 }, { name: femur, material: bone, thickness: 32 } ] }
      - { id: l_knee, name: "knee", parent: l_thigh, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.15, bleed_factor: 1.0,
          layers: [ { name: skin, material: flesh, thickness: 5 }, { name: kneecap, material: bone, thickness: 20 } ] }
      - { id: l_shin, name: "shin", parent: l_thigh, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.40, bleed_factor: 1.2,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 28 }, { name: tibia, material: bone, thickness: 16 }, { name: fibula, material: bone, thickness: 12 } ] }
      - { id: r_leg, name: "right leg", parent: torso, vital: false, targetable: true,
          area_weight: 0.10, tactical_value: 0.3,
          bleed_factor: 1.0, height_low: 0.00, height_high: 0.90,
          layers: [ { name: skin, material: flesh, thickness: 5 }, { name: muscle, material: flesh, thickness: 35 }, { name: bone, material: bone, thickness: 35 } ] }
      - { id: r_thigh, name: "thigh", parent: r_leg, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.45, bleed_factor: 1.5,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: fat, material: flesh, thickness: 10 }, { name: muscle, material: flesh, thickness: 30 }, { name: femur, material: bone, thickness: 32 } ] }
      - { id: r_knee, name: "knee", parent: r_thigh, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.15, bleed_factor: 1.0,
          layers: [ { name: skin, material: flesh, thickness: 5 }, { name: kneecap, material: bone, thickness: 20 } ] }
      - { id: r_shin, name: "shin", parent: r_thigh, targetable: false, vital: false, depth: 0.30,
          area_weight: 0.40, bleed_factor: 1.2,
          layers: [ { name: skin, material: flesh, thickness: 4 }, { name: muscle, material: flesh, thickness: 28 }, { name: tibia, material: bone, thickness: 16 }, { name: fibula, material: bone, thickness: 12 } ] }

      # ---- FEET (targetable; parent = shin). Sole + 5 toes, depth 0.2.
      - { id: l_foot, name: "left foot", parent: l_shin, vital: false, targetable: true,
          area_weight: 0.04, tactical_value: 0.2,
          bleed_factor: 1.0, height_low: 0.00, height_high: 0.10,
          layers: [ { name: skin, material: flesh, thickness: 5 }, { name: muscle, material: flesh, thickness: 15 }, { name: bone, material: bone, thickness: 15 } ] }
      - { id: l_sole,      name: "sole",       parent: l_foot, targetable: false, depth: 0.2, area_weight: 0.5,
          layers: [ { name: skin, material: flesh, thickness: 6 }, { name: muscle, material: flesh, thickness: 12 }, { name: bone, material: bone, thickness: 12 } ] }
      - { id: l_bigtoe,    name: "big toe",    parent: l_foot, targetable: false, depth: 0.2, area_weight: 0.14,
          layers: [ { name: skin, material: flesh, thickness: 3 }, { name: fat, material: flesh, thickness: 1 }, { name: bone, material: bone, thickness: 5 } ] }
      - { id: l_indextoe,  name: "second toe", parent: l_foot, targetable: false, depth: 0.2, area_weight: 0.10,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: l_middletoe, name: "middle toe", parent: l_foot, targetable: false, depth: 0.2, area_weight: 0.09,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 4 } ] }
      - { id: l_ringtoe,   name: "fourth toe", parent: l_foot, targetable: false, depth: 0.2, area_weight: 0.09,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 3 } ] }
      - { id: l_pinkytoe,  name: "little toe", parent: l_foot, targetable: false, depth: 0.2, area_weight: 0.08,
          layers: [ { name: skin, material: flesh, thickness: 2 }, { name: bone, material: bone, thickness: 3 } ] }
      - { id: r_foot, name: "right foot", parent: r_shin, vital: false, targetable: true,
          area_weight: 0.04, tactical_value: 0.2,
          bleed_factor: 1.0, height_low: 0.00, height_high: 0.10,
