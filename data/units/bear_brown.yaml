            - "assets/textures/units/bear_brown/animations/climbing/south-east/frame_006.png"
            - "assets/textures/units/bear_brown/animations/climbing/south-east/frame_007.png"
            - "assets/textures/units/bear_brown/animations/climbing/south-east/frame_008.png"
          east:
            - "assets/textures/units/bear_brown/animations/climbing/east/frame_000.png"
            - "assets/textures/units/bear_brown/animations/climbing/east/frame_001.png"
            - "assets/textures/units/bear_brown/animations/climbing/east/frame_002.png"
