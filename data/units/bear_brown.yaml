units:
  - name: "bear_brown"
    sprite: "assets/textures/units/bear_brown/animations/idle/south/frame_000.png"
    # Bears are wider than humans. Acolyte = 8; bear roughly 2x that.
    base_width: 16
    # Top sprint speed in tiles/sec. ~2× human max (acolyte 3.0)
    # — bears outpace fleeing prey.
    max_speed: 6.0
    # No equipment_class — wildlife doesn't wear gear.
    # No starting_inventory — wildlife has no items.

    eager_stats: true
    stats:
      # Bears are ~3-4× stronger than humans at the rolled mean. Range
      # 1.0 gives sigma 0.25 → individuals fall in [2.5, 3.5] for ~95%.
      strength:     { base: 3.0, range: 1.0 }
      endurance:    { base: 2.0, range: 1.0 }
      # Reflexes: bears are surprisingly fast in short bursts. Slightly
      # above human baseline but well below predator specialists.
      reflexes:     { base: 1.2, range: 0.6 }
      constitution: { base: 2.5, range: 1.0 }
      # Bigger animal → higher resting calorie burn.
      metabolism:   { base: 1.5, range: 0.4 }
      # Excellent smell, good hearing, mediocre eyesight — averaged.
      perception:   { base: 1.8, range: 0.6 }
      # Combat stats. Bears are clumsier than humans on the fine-motor
      # axis (no opposable thumbs); compensate with raw power +
      # toughness. Low intelligence → mostly random body-part picking
      # at attack time. Balance is high (good climbers, swimmers).
      dexterity:    { base: 0.5, range: 0.3 }
      agility:      { base: 1.0, range: 0.4 }
      intelligence: { base: 0.4, range: 0.3 }
      toughness:    { base: 3.0, range: 1.0 }
      # (`balance` is a skill, not a stat — see the skills: block.)

    body:
      # Brown bear shoulder height on all fours ≈ 1.0–1.5m;
      # standing on hind ≈ 2.0–2.5m. Use the on-all-fours measure as
      # the canonical height — that's the bear's normal stance.
      height:  { mean: 1.4, range: 0.6 }   # 1.1..1.7 m at shoulders
      # Bulk: bears are 200–600 kg vs human ~70 kg avg. Mean 4× bulk.
      bulk:    { mean: 4.0, range: 2.0 }   # 3.0..5.0
      # Bodyfat varies hugely with season — fall fat reserves push
      # 40%+, spring closer to 10%. Use 0.25 mean, wide range.
      bodyfat: { mean: 0.25, range: 0.30 } # 0.10..0.40

    skills:
      # Weapon-class skill for natural attacks (claws/fangs).
      unarmed: { base: 60.0, range: 20.0 }
      # Bears are remarkably agile climbers + swimmers; balance ~60
      # slightly above the human baseline.
      balance: { base: 60.0, range: 30.0 }
      # Climbing: bears are natural climbers — start higher than the
      # acolyte's 10. Engine adds XP via diminishing-returns curve on
      # each successful climb (see Unit.Thread.Movement.applyClimbXP).
      climbing: { base: 40.0, range: 15.0 }
      # Bears lunge but aren't true leapers — modest jumping. Their power
      # is in the grab/maul: strong grappling.
      jumping:   { base: 25.0, range: 10.0 }
      grappling: { base: 65.0, range: 20.0 }

    # 8-part quadruped body. Heights anchored to shoulder-height 1.4 m.
    # Head sits out front, similar to shoulder height; tail is low and
    # rear-facing. Vitals (head, neck, torso) collapse the bear when
    # destroyed.
    body_parts:
      # Tissue layers (outer→inner; mm). Thicker bone + flesh than a
      # human; the hide is the per-unit natural_resistance above. A big
      # skull shrugs off blades; the bulk gives the torso real depth.
      # Soft-tissue layers are authored at HUMAN-REFERENCE thicknesses
      # (skin/fat/muscle); the engine scales them up from the bear's own
      # seeded fat_mass / lean_mass / body_mass, so the bear grows a thick
      # fat+muscle barrier without per-species hand-tuning. The thin skin
      # is what a steel dagger pierces; the scaled fat is the real wall.
      - { id: head,         name: "head", parent: neck,  vital: true,
          area_weight: 0.10, tactical_value: 1.0,
          bleed_factor: 2.0,
          height_low: 1.00, height_high: 1.40,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 3 },
                    { name: muscle, material: muscle, thickness: 4 },
                    { name: skull,  material: bone,   thickness: 7 },
                    { name: brain,  material: organ,  thickness: 80 } ] }
      - { id: neck,         name: "neck", parent: torso, vital: true,
          area_weight: 0.05, tactical_value: 1.0,
          bleed_factor: 3.0,
          height_low: 0.95, height_high: 1.10,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 4 },
                    { name: muscle, material: muscle, thickness: 22 },
                    { name: throat, material: organ,  thickness: 10 } ] }
      - { id: torso,        name: "torso", parent: null,  vital: true,
          area_weight: 0.40, tactical_value: 0.8,
          bleed_factor: 2.0,
          height_low: 0.50, height_high: 1.40,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 10 },
                    { name: muscle, material: muscle, thickness: 25 },
                    { name: ribs,   material: bone,   thickness: 10 },
                    { name: vitals, material: organ,  thickness: 120 } ] }
      - { id: l_fore_leg,   name: "left foreleg", parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.95,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 5 },
                    { name: muscle, material: muscle, thickness: 22 },
                    { name: bone,   material: bone,   thickness: 14 } ] }
      - { id: r_fore_leg,   name: "right foreleg", parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.95,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 5 },
                    { name: muscle, material: muscle, thickness: 22 },
                    { name: bone,   material: bone,   thickness: 14 } ] }
      - { id: l_hind_leg,   name: "left hind leg", parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.95,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 5 },
                    { name: muscle, material: muscle, thickness: 25 },
                    { name: bone,   material: bone,   thickness: 16 } ] }
      - { id: r_hind_leg,   name: "right hind leg", parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.95,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 5 },
                    { name: muscle, material: muscle, thickness: 25 },
                    { name: bone,   material: bone,   thickness: 16 } ] }
      - { id: tail,         name: "tail", parent: torso,
          area_weight: 0.05, tactical_value: 0.1,
          bleed_factor: 0.5,
          height_low: 0.40, height_high: 0.60,
          layers: [ { name: skin,   material: flesh,  thickness: 2 },
                    { name: fat,    material: fat,    thickness: 2 },
                    { name: muscle, material: muscle, thickness: 5 },
                    { name: bone,   material: bone,   thickness: 4 } ] }

    # The hide/fat/muscle are now real tissue LAYERS (scaled from the
    # bear's mass), so they carry the protection. natural_resistance is
    # just the residual fur effect: it blunts a slash a little, barely
    # affects a thrust, softens an impact slightly.
    natural_resistance:
      slash: 0.15
      stab:  0.0
      blunt: 0.1

    # Claws + fangs + paw as a virtual unarmed weapon. Each attack kind
    # is a different physical tool with its own material and geometry:
    # keratin claws rake (slash), enamel-tipped canines puncture (stab),
    # a bone-cored paw bludgeons (blunt). effective_blade_length is
    # REACH only (the claws set the band).
    natural_weapon:
      weapon_class:           unarmed
      effective_blade_length: 12.0
      # Base recovery for a quick swing by a 1.0-stat, 1.0-strength,
      # 100%-stamina, no-wound wielder. The Lua cooldown formula scales
      # this up by weight (the bear's paw, derived as body_mass × 0.04),
      # stamina, injury, and inverse agility × dexterity — bears come
      # out at ~1.43 s healthy quick despite the very low 0.9 s base.
      attack_cooldown:        0.9
      wielded_from:           r_fore_leg
      # mass = the striking-head mass (kg); the swinging LIMB mass is
      # inferred from body_mass. length = lever of the appendage (cm),
      # center_of_mass 0..1 from the limb.
      # combo_attack fuses the slash + blunt facets (and a little stab from
      # the claw tips) into ONE "paw" swing — a raking bludgeon. The stab
      # facet is the dedicated BITE: a separate, much stronger thrust with
      # enamel fangs, the bear's best penetrating attack.
      combo_attack: true
      slash: { eff: 0.7, material: keratin, blade_length: 9, sharpness: 110,
               mass: 4,  length: 30, center_of_mass: 0.7, name: claws }   # forepaw claws
      stab:  { eff: 0.9, material: enamel,  blade_length: 7, sharpness: 45,
               mass: 2,  length: 14, center_of_mass: 0.6, name: fangs }   # the bite
      blunt: { eff: 0.6, material: bone,    impact_area: 55,
               mass: 6,  length: 25, center_of_mass: 0.7, name: paw }     # paw smash

    # Per-direction T-pose. Each entry is the first frame of the idle
    # animation in that direction — gives the engine a still sprite to
    # fall back to when no animation is active. SW / W / NW are
    # mirrored from SE / E / NE at draw time via `mirrorDir`.
    directional_sprites:
      south:      "assets/textures/units/bear_brown/animations/idle/south/frame_000.png"
      south-east: "assets/textures/units/bear_brown/animations/idle/south-east/frame_000.png"
      east:       "assets/textures/units/bear_brown/animations/idle/east/frame_000.png"
      north-east: "assets/textures/units/bear_brown/animations/idle/north-east/frame_000.png"
      north:      "assets/textures/units/bear_brown/animations/idle/north/frame_000.png"

    # Pose-keyed state→animation map. Keys are arbitrary strings the
    # bear AI (Lua) reads; values are animation names declared below.
    # Reverse transitions reuse the forward asset and the engine plays
    # `uiAnimReverse` to step the frame index backward, matching the
    # acolyte's convention (see gotchas: "Transition reverse plays the
    # forward asset backward").
    state_animations:
      # On-all-fours core
      standing-idle:               idle
      standing-walk:               walk
      standing-run:                run
      standing-drink:              drink
      standing-eat:                drink   # one anim covers both per design
      standing-combat-idle:        combat_idle
      standing-attack-quick:       attack_quick
      standing-attack-heavy:       attack_heavy
      standing-hit-react:          hit_react
      standing-death:              death
      # Held on the last frame after UnitKill — death anim has
      # aLoop=false, so the renderer freezes on the final pose.
      # Without this entry, dying bears fall back to T-pose.
      dead-idle:                   death

      # Standing-on-hind (alert / look-around posture, NOT a combat
      # stance — bears rise to scan their surroundings, then drop back
      # to all fours to walk or fight).
      stand_on_hind-idle:          stand_on_hind_idle

      # Resting poses
      sitting-idle:                sitting_idle
      lying-idle:                  lying_down_idle
      sleeping-idle:               sleeping_idle

      # Pose transitions — forward and reverse reuse the same asset
      standing-to-stand_on_hind:   stand_on_hind
      stand_on_hind-to-standing:   stand_on_hind          # reversed
      standing-to-sitting:         standing_to_sitting
      sitting-to-standing:         standing_to_sitting    # reversed
      sitting-to-lying:            sitting_to_lying_down
      lying-to-sitting:            sitting_to_lying_down  # reversed
      lying-to-sleeping:           lying_down_to_sleeping
      sleeping-to-lying:           lying_down_to_sleeping # reversed

      # Climbing. Engine triggers Standing → Climbing automatically
      # when a movement step hits a cliff. At the top, engine
      # auto-chains Climbing → Crawling → Standing via usPostTransition.
      # For the bear, "Crawling" is conceptually "lying-on-belly"
      # (post-pullup, before getting back up to all fours) — we
      # reuse the lying_down_idle still for the brief crawling-idle
      # moment and the collapsed_to_standing asset for the recovery.
      climbing-idle:               climbing
      climbing-walk:               climbing
      standing-to-climbing:        climbing       # the long ascent itself
      climbing-to-crawling:        pullup         # over-the-edge pullup
      crawling-to-standing:        collapsed_to_standing
                                                  # reuse the recovery anim
      crawling-idle:               lying_down_idle
                                                  # bear "crawling" = lying

      # Falling. Engine triggers Standing → Falling when dz ≥
      # fallTriggerDz (2). At impact, the engine picks the outcome
      # from usFallImpact: walk-off, collapse, or kill.
      falling-idle:                falling        # held mid-air (unreached)
      standing-to-falling:         falling        # descent loop
      falling-to-collapsed:        landing        # landing → collapse

      # Collapsed pose. Held by units knocked out from low blood or
      # a non-lethal fall; lying_down_idle covers the static held
      # state and collapsed_to_standing plays for recovery (called
      # by unit_resources' auto-revive path).
      collapsed-idle:              lying_down_idle
      collapsed-to-standing:       collapsed_to_standing

      # Injured set. Engine state-driven resolution tries the
      # `injured-<pose>-<activity>` key first when cumulative wound
      # severity > 1.0 (see publishToRender), falling back to the
      # plain `<pose>-<activity>` key. So a bear that's hurting
      # walks with `injured_walk` automatically.
      injured-standing-idle:       injured_idle
      injured-standing-walk:       injured_walk
      injured-standing-run:        injured_run
      injured-standing-eat:        injured_eat
      injured-standing-drink:      injured_eat   # reuse, same as healthy
      injured-dead-idle:           injured_death
      # Combat-specific anims (combat_idle, attack_quick/heavy,
      # hit_react) are picked Lua-side via unit.setAnimOverride and
      # are not state-keyed. The combatAnimName helper applies the
      # "injured_" prefix when needed.

    animations:
      attack_heavy:
        fps: 12
        loop: false
        flip: true
        frames:
          south:
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_000.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_001.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_002.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_003.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_004.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_005.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_006.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_007.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south/frame_008.png"
          south-east:
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_000.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_001.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_002.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_003.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_004.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_005.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_006.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_007.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/south-east/frame_008.png"
          east:
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_000.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_001.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_002.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_003.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_004.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_005.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_006.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_007.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/east/frame_008.png"
          north-east:
