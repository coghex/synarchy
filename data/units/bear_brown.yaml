            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_001.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_002.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_003.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_004.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_005.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_006.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_007.png"
            - "assets/textures/units/bear_brown/animations/attack_heavy/north/frame_008.png"

      attack_quick:
        fps: 10
        loop: false
        flip: true
        frames:
          south:
            - "assets/textures/units/bear_brown/animations/attack_quick/south/frame_000.png"
            - "assets/textures/units/bear_brown/animations/attack_quick/south/frame_001.png"
            - "assets/textures/units/bear_brown/animations/attack_quick/south/frame_002.png"
            - "assets/textures/units/bear_brown/animations/attack_quick/south/frame_003.png"
