units:
  - name: "gray_wolf"
    sprite: "assets/textures/units/gray_wolf/animations/idle/south/frame_000.png"
    # Wolves are between acolyte (8) and bear (16) in footprint.
    base_width: 12
    # Top sprint ~58 km/h, a touch above the bear's burst — wolves are
    # built for the chase.
    max_speed: 6.5
    # No equipment_class / starting_inventory — wildlife.

    eager_stats: true
    stats:
      # ~40 kg canine: bite is fearsome but body strength just above
      # human baseline.
      strength:     { base: 1.2, range: 0.5 }
      # Legendary pursuit endurance — wolves trot for hours.
      endurance:    { base: 2.5, range: 0.8 }
      reflexes:     { base: 1.6, range: 0.5 }
      constitution: { base: 1.3, range: 0.5 }
      metabolism:   { base: 1.2, range: 0.4 }
      # Smell + hearing are exceptional; night vision good.
      perception:   { base: 2.2, range: 0.6 }
      # No hands → low fine motor; very agile body; pack hunters are
      # smart for animals (deliberate body-part targeting at times).
      dexterity:    { base: 0.5, range: 0.3 }
      agility:      { base: 1.6, range: 0.5 }
      intelligence: { base: 0.8, range: 0.4 }
      toughness:    { base: 1.0, range: 0.4 }

    body:
      # Shoulder height 0.6–1.0 m on all fours.
      height:  { mean: 0.8, range: 0.4 }
      # 30–50 kg vs human ~70 — bulk below 1.
      bulk:    { mean: 0.6, range: 0.3 }
      bodyfat: { mean: 0.15, range: 0.20 }

    skills:
      # Natural attacks (fangs).
      unarmed: { base: 55.0, range: 20.0 }
      balance: { base: 55.0, range: 25.0 }
      # Wolves don't climb.
      climbing: { base: 5.0, range: 5.0 }

    # 8-part quadruped body anchored to 0.8 m shoulder height.
    body_parts:
      - { id: head,         parent: neck,  vital: true,
          area_weight: 0.10, tactical_value: 1.0,
          max_health_factor: 0.20, bleed_factor: 2.0,
          height_low: 0.55, height_high: 0.85 }
      - { id: neck,         parent: torso, vital: true,
          area_weight: 0.05, tactical_value: 1.0,
          max_health_factor: 0.15, bleed_factor: 3.0,
          height_low: 0.50, height_high: 0.65 }
      - { id: torso,        parent: null,  vital: true,
          area_weight: 0.40, tactical_value: 0.8,
          max_health_factor: 0.40, bleed_factor: 2.0,
          height_low: 0.30, height_high: 0.80 }
      - { id: l_fore_leg,   parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          max_health_factor: 0.25, bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.55 }
      - { id: r_fore_leg,   parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          max_health_factor: 0.25, bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.55 }
      - { id: l_hind_leg,   parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          max_health_factor: 0.25, bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.55 }
      - { id: r_hind_leg,   parent: torso,
          area_weight: 0.10, tactical_value: 0.3,
          max_health_factor: 0.25, bleed_factor: 1.0,
          height_low: 0.00, height_high: 0.55 }
      - { id: tail,         parent: torso,
          area_weight: 0.05, tactical_value: 0.1,
          max_health_factor: 0.05, bleed_factor: 0.5,
          height_low: 0.30, height_high: 0.55 }

    # Fur turns some slash/blunt; little protection against stabs.
    natural_resistance:
      slash: 0.3
      stab:  0.05
      blunt: 0.2

    # Fangs — wolves attack with the bite, wielded from the head
    # (unlike the bear's paw swipe).
    natural_weapon:
      weapon_class:           unarmed
      effective_blade_length: 8.0
      attack_cooldown:        0.7
      wielded_from:           head
      stab_eff:               0.8
      slash_eff:              0.4
      blunt_eff:              0.2

    # Per-direction T-pose stills (idle frame 0). SW/W/NW mirrored.
    directional_sprites:
      south:      "assets/textures/units/gray_wolf/animations/idle/south/frame_000.png"
      south-east: "assets/textures/units/gray_wolf/animations/idle/south-east/frame_000.png"
      east:       "assets/textures/units/gray_wolf/animations/idle/east/frame_000.png"
      north-east: "assets/textures/units/gray_wolf/animations/idle/north-east/frame_000.png"
      north:      "assets/textures/units/gray_wolf/animations/idle/north/frame_000.png"

    # Full state→animation map, paralleling bear_brown minus the
    # climbing and stand-on-hind chains (wolves do neither). The
    # engine auto-falls back to the plain key when an injured- key
    # is absent, and to the directional still when no key matches.
    state_animations:
      standing-idle:               idle
      standing-walk:               walk
      standing-run:                run
      standing-drink:              drink
      standing-eat:                drink   # one anim covers both, bear convention
      standing-combat-idle:        combat_idle
      standing-attack-quick:       attack_quick
      standing-attack-heavy:       attack_heavy
      standing-hit-react:          hit_react
      standing-death:              death
      # Hold last death frame after UnitKill (loop=false) — without
      # this, dead wolves T-pose.
      dead-idle:                   death

      # Resting poses + transitions (reverse plays forward backward).
      sitting-idle:                sitting_idle
      lying-idle:                  lying_down_idle
      sleeping-idle:               sleeping_idle
      standing-to-sitting:         standing_to_sitting
      sitting-to-standing:         standing_to_sitting    # reversed
      sitting-to-lying:            sitting_to_lying_down
      lying-to-sitting:            sitting_to_lying_down  # reversed
      lying-to-sleeping:           lying_down_to_sleeping
      sleeping-to-lying:           lying_down_to_sleeping # reversed

      # Falling chain. No climbing chain — wolves can't climb
      # (climbing skill ~5); cliff steps will show stills, acceptable.
      falling-idle:                falling
      standing-to-falling:         falling
      falling-to-collapsed:        landing

      # Collapse + recovery; "crawling" = lying for quadrupeds
      # (bear convention).
      collapsed-idle:              lying_down_idle
      collapsed-to-standing:       collapsed_to_standing
      crawling-idle:               lying_down_idle
      crawling-to-standing:        collapsed_to_standing

      # Injured set — engine tries injured-<pose>-<activity> first
      # when wound severity > 1.0, falls back to plain keys.
      injured-standing-idle:       injured_idle
      injured-standing-walk:       injured_walk
      injured-standing-run:        injured_run
      injured-standing-eat:        injured_eat
      injured-standing-drink:      injured_eat
      injured-dead-idle:           injured_death

