# Semantic concept catalogue (#709) — the vocabulary proper-name
# meanings are built from (see Language.Semantic.Types for the name
# forms, Language.Semantic.English for the gloss renderer).
#
# LOAD-BEARING: each `id` is the stable identity of a concept. #710's
# generated languages derive every native root deterministically from
# the id string, so renaming or reusing an id silently re-roots every
# generated language that mentions it. Ids may be ADDED, never renamed,
# removed, or repurposed. English wording, by contrast, is free to
# improve — it is display data, not identity.
#
# Every lexical form is AUTHORED, never derived from spelling:
#   singular    the citation noun ("memory")
#   plural      explicit, including irregulars ("memories", "wolves")
#               and zero plurals for mass nouns ("ice", "gold")
#   modifier    the attributive form; a real adjective where English
#               has one ("ashen", "sworn", "divine"), the noun adjunct
#               where it doesn't ("iron", "storm")
#   possessive  the owner form, apostrophe included ("wolf's")
# Forms are single words (the renderer owns spacing/capitalization).
#
# The starter set intentionally authors ALL FOUR forms for every
# concept so #710 can sample any name form over any concepts without
# hitting a missing-form error at generation time; a test pins this.
# Domains: place, element, celestial, creature, emotion, mythic.
version: 1
concepts:
  # ---- World / place heads --------------------------------------------
  - { id: LAND,    domain: place, singular: land,   plural: lands,   modifier: land,    possessive: "land's" }
  - { id: ISLE,    domain: place, singular: isle,   plural: isles,   modifier: isle,    possessive: "isle's" }
  - { id: VALE,    domain: place, singular: vale,   plural: vales,   modifier: vale,    possessive: "vale's" }
