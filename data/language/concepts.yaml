  - { id: GATE,    domain: place, singular: gate,   plural: gates,   modifier: gate,    possessive: "gate's" }
  - { id: THRONE,  domain: place, singular: throne, plural: thrones, modifier: throne,  possessive: "throne's" }
  - { id: SPIRE,   domain: place, singular: spire,  plural: spires,  modifier: spire,   possessive: "spire's" }

