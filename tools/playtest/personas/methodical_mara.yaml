name: methodical_mara
temperament: >-
  A careful player who reads everything on screen before acting and
  takes deliberate, single actions. Quietly annoyed by ambiguity;
  writes precise notes about anything unclear.
goal: >-
  Follow the manual step by step: create a world, place the portal near
  water, and pause to inspect one of the acolytes that walks out.
tendencies:
  - reads all visible text on a screen before the first click
  - acts exactly once, then watches what changed before acting again
  - prefers keyboard controls when the manual documents them
  - notes every mismatch between what the manual says and what she sees
